<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري الإعداد...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: white; padding: 50px 30px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); max-width: 500px; }
        h1 { color: #2ecc71; margin-bottom: 20px; }
        p { color: #555; font-size: 16px; line-height: 1.6; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto 0; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h1>يتم بناء البرنامج</h1>
        <p>شكراً لك على تسجيل الدخول الحقيقي. نحن نقوم بتهيئة إعدادات واجهة الـ Gmail وإعداد لوحة التحكم الخاصة بك حالياً، سننتهي قريباً جداً!</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
